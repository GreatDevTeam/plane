name: Build to Harbor

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: registry-harbor.jobscanner.pro/plane

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - name: plane-frontend
            context: .
            dockerfile: ./apps/web/Dockerfile.web
          - name: plane-admin
            context: .
            dockerfile: ./apps/admin/Dockerfile.admin
          - name: plane-space
            context: .
            dockerfile: ./apps/space/Dockerfile.space
          - name: plane-live
            context: .
            dockerfile: ./apps/live/Dockerfile.live
          - name: plane-backend
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile.api
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: registry-harbor.jobscanner.pro
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ matrix.name }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ matrix.name }}:custom
